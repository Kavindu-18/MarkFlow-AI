name: Deploy Apps

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: crmarkflow
  RESOURCE_GROUP: rg-markflow-dev

jobs:
  build-and-push:
    name: Build & Push (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - app: api-gateway
            dockerfile: infra/docker/api-gateway.Dockerfile
            context: apps/api-gateway
          - app: lti-service
            dockerfile: infra/docker/lti-service.Dockerfile
            context: apps/lti-service
          - app: web
            dockerfile: infra/docker/web.Dockerfile
            context: .
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build & Push
        run: |
          IMAGE=${{ env.ACR_NAME }}.azurecr.io/${{ matrix.app }}:${{ github.sha }}
          docker build -f ${{ matrix.dockerfile }} -t $IMAGE ${{ matrix.context }}
          docker push $IMAGE

  deploy:
    name: Deploy to Container Apps
    runs-on: ubuntu-latest
    needs: build-and-push
    strategy:
      matrix:
        include:
          - app: api-gateway
            container_app: ca-api-gateway
          - app: lti-service
            container_app: ca-lti-service
          - app: web
            container_app: ca-web
    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy revision
        run: |
          az containerapp update \
            --name ${{ matrix.container_app }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/${{ matrix.app }}:${{ github.sha }}
