name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test-ts:
    name: Lint & Test (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm turbo lint

      - name: Build packages
        run: pnpm turbo build

      - name: Test
        run: pnpm turbo test

      - name: Format check
        run: pnpm format:check

  lint-and-test-go:
    name: Lint & Test (Go)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-gateway, lti-service]
    defaults:
      run:
        working-directory: apps/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: apps/${{ matrix.service }}/go.sum

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: apps/${{ matrix.service }}

      - name: Test
        run: go test -race -coverprofile=coverage.txt ./...

      - name: Build
        run: go build -o /dev/null ./cmd/server

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.9'

      - run: terraform init -backend=false
      - run: terraform validate
      - run: terraform fmt -check -recursive
